version: '3.8'

services:
  # PostgreSQL (per quando si migra da SQLite)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: planning
      POSTGRES_PASSWORD: planning_dev
      POSTGRES_DB: planning_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://planning:planning_dev@postgres:5432/planning_app
      USE_DATABASE: "false"
      JWT_SECRET: planning-dev-secret
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/backend/data:/app/packages/backend/data

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:

